name: Update FITNESS 24 calendar

on:
  workflow_dispatch:
  schedule:
    - cron: "10 8,20 * * *"
      timezone: "Europe/Berlin"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-calendar:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate calendar
        run: python generate_calendar.py --config config.yaml

      - name: Commit updated calendar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/fitness24-primorskiy.ics
          git diff --cached --quiet && echo "No calendar changes" || git commit -m "Update FITNESS 24 calendar"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: update-calendar
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
